<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Photos - Westminster Woods Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Admin Navigation -->
    <nav class="admin-navbar">
        <div class="navbar-brand">
            <i class="fas fa-shield-alt"></i>
            <span>Westminster Woods Admin</span>
        </div>
        <div class="navbar-menu">
            <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
            <a href="admin-events.html" class="nav-link">Events</a>
            <a href="admin-photos.html" class="nav-link active">Photos</a>
            <a href="admin-profile.html" class="nav-link">Profile</a>
            <button id="logout-btn" class="nav-link logout">Logout</button>
        </div>
    </nav>

    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-menu">
                <a href="admin-dashboard.html" class="menu-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="admin-events.html" class="menu-item">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Manage Events</span>
                </a>
                <a href="admin-photos.html" class="menu-item active">
                    <i class="fas fa-image"></i>
                    <span>Manage Photos</span>
                </a>
                <a href="admin-profile.html" class="menu-item">
                    <i class="fas fa-user-circle"></i>
                    <span>Profile Settings</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="content-header">
                <h1>Manage Photos</h1>
                <button id="add-photo-btn" class="btn-primary">
                    <i class="fas fa-plus"></i> Upload Photo
                </button>
            </div>

            <!-- Photos Filter -->
            <div class="filter-section">
                <input type="text" id="search-photos" placeholder="Search photos...">
                <select id="filter-category-photos">
                    <option value="">All Categories</option>
                    <option value="events">Events</option>
                    <option value="community">Community</option>
                    <option value="activities">Activities</option>
                </select>
            </div>

            <!-- Photos Grid -->
            <div id="photos-container" class="photos-container">
                <!-- Photos will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Add/Edit Photo Modal -->
    <div id="photo-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="photo-modal-title">Upload New Photo</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="photo-form" class="modal-form">
                <div class="form-group">
                    <label for="photo-title">Photo Title *</label>
                    <input type="text" id="photo-title" required>
                </div>

                <div class="form-group">
                    <label for="photo-url">Photo URL *</label>
                    <input type="url" id="photo-url" placeholder="https://example.com/photo.jpg" required>
                    <small>Paste image URL from online sources or use base64 data URL</small>
                </div>

                <div class="form-group">
                    <label for="photo-category">Category *</label>
                    <select id="photo-category" required>
                        <option value="">Select Category</option>
                        <option value="events">Events</option>
                        <option value="community">Community</option>
                        <option value="activities">Activities</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="photo-description">Description</label>
                    <textarea id="photo-description" rows="3" placeholder="Photo description"></textarea>
                </div>

                <div class="form-group">
                    <label>Preview:</label>
                    <img id="photo-preview" src="" alt="Photo preview" style="max-width: 100%; max-height: 300px; display: none; border-radius: 6px;">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="photo-modal-cancel">Cancel</button>
                    <button type="submit" class="btn-primary">Upload Photo</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        let currentEditingPhotoId = null;
        const photoModal = document.getElementById('photo-modal');
        const photoForm = document.getElementById('photo-form');

        document.addEventListener('DOMContentLoaded', function() {
            checkAdminAccess();
            loadPhotos();
            setupPhotoListeners();
        });

        function setupPhotoListeners() {
            document.getElementById('add-photo-btn').addEventListener('click', openAddPhotoModal);
            document.querySelector('.modal-close').addEventListener('click', closePhotoModal);
            document.getElementById('photo-modal-cancel').addEventListener('click', closePhotoModal);
            document.getElementById('photo-form').addEventListener('submit', handlePhotoSubmit);
            document.getElementById('search-photos').addEventListener('input', filterPhotos);
            document.getElementById('filter-category-photos').addEventListener('change', filterPhotos);
            document.getElementById('photo-url').addEventListener('change', updatePhotoPreview);
            setupLogout();
        }

        function openAddPhotoModal() {
            currentEditingPhotoId = null;
            document.getElementById('photo-modal-title').textContent = 'Upload New Photo';
            photoForm.reset();
            document.getElementById('photo-preview').style.display = 'none';
            photoModal.style.display = 'block';
        }

        function closePhotoModal() {
            photoModal.style.display = 'none';
        }

        function updatePhotoPreview() {
            const url = document.getElementById('photo-url').value;
            const preview = document.getElementById('photo-preview');
            
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
                preview.onerror = function() {
                    alert('Invalid image URL. Please check the URL and try again.');
                    preview.style.display = 'none';
                };
            } else {
                preview.style.display = 'none';
            }
        }

        function loadPhotos() {
            const photos = JSON.parse(localStorage.getItem('communityPhotos')) || [];
            displayPhotos(photos);
        }

        function displayPhotos(photos) {
            const container = document.getElementById('photos-container');
            
            if (photos.length === 0) {
                container.innerHTML = '<p class="empty-message">No photos yet. <button onclick="document.getElementById(\'add-photo-btn\').click()">Upload the first photo</button></p>';
                return;
            }

            container.innerHTML = photos.map(photo => `
                <div class="photo-card">
                    <div class="photo-image">
                        <img src="${photo.src}" alt="${photo.title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Crect fill=%22%23ddd%22 width=%22300%22 height=%22300%22/%3E%3C/svg%3E'">
                    </div>
                    <div class="photo-info">
                        <h3>${photo.title}</h3>
                        <p><strong>Category:</strong> <span class="badge">${photo.category}</span></p>
                        <p class="description">${photo.description || 'No description'}</p>
                        <p class="upload-date">Uploaded: ${photo.uploadDate || 'N/A'}</p>
                    </div>
                    <div class="photo-actions">
                        <button onclick="editPhoto('${photo.id}')" class="btn-small btn-primary">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button onclick="deletePhoto('${photo.id}')" class="btn-small btn-danger">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function handlePhotoSubmit(e) {
            e.preventDefault();

            const photos = JSON.parse(localStorage.getItem('communityPhotos')) || [];
            
            const photoData = {
                id: currentEditingPhotoId || Date.now().toString(),
                title: document.getElementById('photo-title').value,
                src: document.getElementById('photo-url').value,
                category: document.getElementById('photo-category').value,
                description: document.getElementById('photo-description').value,
                uploadDate: new Date().toLocaleDateString()
            };

            if (currentEditingPhotoId) {
                const index = photos.findIndex(p => p.id === currentEditingPhotoId);
                photos[index] = photoData;
                alert('Photo updated successfully!');
            } else {
                photos.push(photoData);
                alert('Photo uploaded successfully!');
            }

            localStorage.setItem('communityPhotos', JSON.stringify(photos));
            closePhotoModal();
            loadPhotos();
            updateHomePagePhotos();
        }

        function editPhoto(photoId) {
            const photos = JSON.parse(localStorage.getItem('communityPhotos')) || [];
            const photo = photos.find(p => p.id === photoId);

            if (photo) {
                currentEditingPhotoId = photoId;
                document.getElementById('photo-modal-title').textContent = 'Edit Photo';
                document.getElementById('photo-title').value = photo.title;
                document.getElementById('photo-url').value = photo.src;
                document.getElementById('photo-category').value = photo.category;
                document.getElementById('photo-description').value = photo.description;
                document.getElementById('photo-preview').src = photo.src;
                document.getElementById('photo-preview').style.display = 'block';
                photoModal.style.display = 'block';
            }
        }

        function deletePhoto(photoId) {
            if (confirm('Are you sure you want to delete this photo?')) {
                let photos = JSON.parse(localStorage.getItem('communityPhotos')) || [];
                photos = photos.filter(p => p.id !== photoId);
                localStorage.setItem('communityPhotos', JSON.stringify(photos));
                alert('Photo deleted successfully!');
                loadPhotos();
                updateHomePagePhotos();
            }
        }

        function filterPhotos() {
            const searchTerm = document.getElementById('search-photos').value.toLowerCase();
            const category = document.getElementById('filter-category-photos').value;
            
            let photos = JSON.parse(localStorage.getItem('communityPhotos')) || [];
            
            photos = photos.filter(photo => {
                const matchesSearch = photo.title.toLowerCase().includes(searchTerm) || 
                                     photo.description.toLowerCase().includes(searchTerm);
                const matchesCategory = !category || photo.category === category;
                return matchesSearch && matchesCategory;
            });

            displayPhotos(photos);
        }

        function updateHomePagePhotos() {
            window.dispatchEvent(new Event('photosUpdated'));
        }

        window.addEventListener('click', function(e) {
            if (e.target === photoModal) {
                closePhotoModal();
            }
        });
    </script>
</body>
</html>
